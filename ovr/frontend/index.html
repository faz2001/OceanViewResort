<!DOCTYPE html>
<html lang="en" data-theme="dark" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean View Resort — Staff Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── CSS Variables ─── */
:root {
  --bg:      #0B132B;
  --bg2:     #1C2541;
  --panel:   rgba(28,37,65,0.88);
  --accent:  #5BC0BE;
  --adim:    rgba(91,192,190,0.12);
  --aglow:   rgba(91,192,190,0.22);
  --txt:     #E8EAF0;
  --txt2:    #BDC3C7;
  --muted:   #6B7D96;
  --border:  rgba(91,192,190,0.18);
  --err:     #E05C5C;
  --ok:      #4CAF87;
  --r:       6px;
  --shadow:  0 24px 80px rgba(0,0,0,0.55);
}
[data-theme="light"] {
  --bg:      #F8FAFC;
  --bg2:     #FFFFFF;
  --panel:   rgba(255,255,255,0.9);
  --accent:  #0077B6;
  --adim:    rgba(0,119,182,0.08);
  --aglow:   rgba(0,119,182,0.18);
  --txt:     #0B132B;
  --txt2:    #1E3A5F;
  --muted:   #64748B;
  --border:  rgba(0,119,182,0.18);
  --err:     #D93B3B;
  --ok:      #0A9B6A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  transition:background-color .3s,color .3s,border-color .3s;}
html,body{height:100%;font-family:'Inter',sans-serif;}
body{
  background:var(--bg); color:var(--txt);
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden; position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 60% at 20% 30%, var(--aglow) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 80% 70%, var(--adim)  0%, transparent 60%);
}
/* Theme toggle top-right */
.theme-btn{
  position:fixed;top:16px;right:16px;z-index:10;
  width:38px;height:38px;border-radius:50%;
  background:var(--adim);border:1px solid var(--border);
  cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.theme-btn:hover{background:var(--aglow);transform:rotate(20deg);}
/* Card */
.card{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 1fr;
  max-width:880px;width:95%;min-height:540px;
  border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow);
  animation:up .65s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
/* Left panel */
.left{
  background:linear-gradient(155deg,var(--bg2) 0%,var(--bg) 100%);
  padding:52px 44px;display:flex;flex-direction:column;
  justify-content:space-between;border-right:1px solid var(--border);
  position:relative;overflow:hidden;
}
.left::after{
  content:'';position:absolute;bottom:-70px;right:-70px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,var(--aglow),transparent 70%);
  pointer-events:none;
}
.brand-icon{
  width:48px;height:48px;border-radius:10px;
  background:var(--adim);border:1.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:18px;
}
.brand h1{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:400;
  color:var(--txt);line-height:1.2;
}
.brand h1 span{color:var(--accent);font-weight:600;}
.brand p{margin-top:8px;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);}
.tagline{
  font-family:'Playfair Display',serif;font-size:36px;font-weight:300;
  font-style:italic;color:var(--accent);opacity:.18;line-height:1.3;
  user-select:none;
}
/* Right panel */
.right{
  background:var(--panel);backdrop-filter:blur(20px);
  padding:44px 40px;display:flex;flex-direction:column;justify-content:center;
}
.tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:32px;}
.tab{
  flex:1;padding:11px;background:transparent;border:none;
  color:var(--muted);font-family:'Inter',sans-serif;font-size:12.5px;
  letter-spacing:.3px;cursor:pointer;transition:all .2s;
}
.tab.active{background:var(--accent);color:var(--bg);font-weight:600;}
.form-section{display:none;}
.form-section.active{display:block;}
.form-title{
  font-family:'Playfair Display',serif;font-size:24px;font-weight:400;
  color:var(--txt);margin-bottom:5px;
}
.form-sub{font-size:12.5px;color:var(--muted);margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:9.5px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-weight:500;}
.field input{
  width:100%;background:var(--adim);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 14px;color:var(--txt);
  font-family:'Inter',sans-serif;font-size:13.5px;outline:none;
}
.field input:focus{border-color:var(--accent);background:var(--aglow);}
.field input::placeholder{color:var(--muted);}
.btn-primary{
  width:100%;padding:13px;background:var(--accent);border:none;
  border-radius:var(--r);color:var(--bg);font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 6px 20px var(--aglow);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.alert{padding:10px 13px;border-radius:var(--r);font-size:12.5px;margin-bottom:14px;display:none;}
.alert.error  {background:rgba(224,92,92,.1); color:var(--err);border:1px solid rgba(224,92,92,.25);display:block;}
.alert.success{background:rgba(76,175,135,.1);color:var(--ok); border:1px solid rgba(76,175,135,.25);display:block;}
/* Bill card */
.bill-card{
  background:var(--adim);border:1px solid var(--accent);
  border-radius:10px;padding:18px;margin-top:14px;display:none;
}
.bill-card.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bill-card h3{
  font-family:'Playfair Display',serif;color:var(--accent);
  font-size:16px;margin-bottom:12px;
}
.bill-row{
  display:flex;justify-content:space-between;
  font-size:12.5px;color:var(--muted);padding:5px 0;
  border-bottom:1px solid var(--border);
}
.bill-row:last-child{border-bottom:none;}
.bill-row span:last-child{color:var(--txt);}
.bill-row.total{
  font-size:15px;font-weight:700;color:var(--txt);
  padding-top:10px;margin-top:4px;
  border-top:1.5px solid var(--accent);border-bottom:none;
}
.bill-row.total span:last-child{color:var(--accent);}
@media(max-width:640px){
  .card{grid-template-columns:1fr;}
  .left{display:none;}
  .right{padding:32px 24px;}
}
</style>
</head>
<body>

<button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>

<div class="card">
  <!-- Left Panel -->
  <div class="left">
    <div class="brand">
      <div class="brand-icon">🏖️</div>
      <h1>Ocean View<br><span>Resort</span></h1>
      <p>Staff Management Portal</p>
    </div>
    <div class="tagline">Where the ocean<br>meets excellence.</div>
  </div>

  <!-- Right Panel -->
  <div class="right">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Staff / Admin Login</button>
      <button class="tab"        onclick="switchTab('ebill')">Guest E-Bill</button>
    </div>

    <!-- ── Login Form (Sequence 1) ── -->
    <div id="tab-login" class="form-section active">
      <p class="form-title">Welcome back</p>
      <p class="form-sub">Sign in to access the hotel management dashboard.</p>
      <div id="login-alert" class="alert"></div>
      <div class="field">
        <label>Username</label>
        <input id="login-user" type="text" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
      <p style="margin-top:12px;font-size:11px;color:var(--muted);text-align:center">
        Demo: <strong style="color:var(--accent)">admin</strong> / admin123 &nbsp;|&nbsp;
        <strong style="color:var(--accent)">nadia</strong> / staff123
      </p>
    </div>

    <!-- ── Guest E-Bill Form (Sequence 5) ── -->
    <div id="tab-ebill" class="form-section">
      <p class="form-title">View Your Bill</p>
      <p class="form-sub">Enter your reservation number to view and download your e-bill.</p>
      <div id="ebill-alert" class="alert"></div>
      <div class="field">
        <label>Reservation Number</label>
        <input id="ebill-resno" type="text" placeholder="e.g. RES-20250301-001">
      </div>
      <button class="btn-primary" onclick="lookupEBill()">View E-Bill</button>
      <!-- Bill result (Sequence 5: displayEBill) -->
      <div id="bill-card" class="bill-card">
        <h3>📋 Billing Summary</h3>
        <div id="bill-rows"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/api';
const html = document.getElementById('html-root');
const themeBtn = document.getElementById('theme-btn');

/* ── Theme ── */
(function() {
  const t = localStorage.getItem('hotel-theme') || 'dark';
  html.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '🌙' : '☀️';
})();
function toggleTheme() {
  const t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('hotel-theme', t);
}

/* ── Tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((b,i) =>
    b.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-ebill').classList.toggle('active', tab==='ebill');
  clearAlerts();
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert ' + type;
  el.textContent = msg;
}
function clearAlerts() {
  document.querySelectorAll('.alert').forEach(a => { a.className='alert'; a.textContent=''; });
  document.getElementById('bill-card').classList.remove('show');
}
const fmt = v => 'LKR ' + parseFloat(v).toLocaleString('en-LK',{minimumFractionDigits:2});

/* ══════════════════════════════════
   SEQUENCE 1 — Login
   User → LoginUI: enter(username, password)
   LoginUI → AuthService: login(username, password)
   AuthService → UserDB: findUser(username)
   result: success → showMainMenu() | fail → showError("Invalid credentials")
══════════════════════════════════ */
async function doLogin() {
  // 1. User → LoginUI: enter(username, password)
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value.trim();
  const btn      = document.getElementById('login-btn');

  if (!username || !password) {
    // [fail] showError
    showAlert('login-alert','error','Please enter username and password.');
    return;
  }
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    // 2. LoginUI → AuthService: login(username, password)
    const res  = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();

    if (data.success) {
      // [success] LoginUI → User: showMainMenu()
      sessionStorage.setItem('user', JSON.stringify(data.user));
      showAlert('login-alert','success',`Welcome, ${data.user.fullName}! Redirecting…`);
      setTimeout(() => window.location.href = 'dashboard.html', 700);
    } else {
      // [fail] showError("Invalid credentials")
      showAlert('login-alert','error', data.message || 'Invalid credentials.');
    }
  } catch (e) {
    showAlert('login-alert','error','Cannot connect to server. Is the backend running on port 8080?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

/* ══════════════════════════════════
   SEQUENCE 5 — Guest View E-Bill
   Guest → EBillUI: enterReservationNo(resNo)
   EBillUI → BillingService: viewEBill(resNo)
   [found] displayEBill(total)
   [invalid] showError("Invalid reservation number")
══════════════════════════════════ */
async function lookupEBill() {
  // 1. Guest → EBillUI: enterReservationNo(resNo)
  const resNo = document.getElementById('ebill-resno').value.trim().toUpperCase();
  clearAlerts();

  if (!resNo) {
    showAlert('ebill-alert','error','Please enter a reservation number.');
    return;
  }

  try {
    // 2. EBillUI → BillingService: viewEBill(resNo) → /api/ebill/{resNo}
    const res  = await fetch(`${API}/ebill/${resNo}`);
    const data = await res.json();

    if (!data.success) {
      // [invalid/not found] showError("Invalid reservation number")
      showAlert('ebill-alert','error', data.message || 'Invalid reservation number');
      return;
    }

    // [found] displayEBill(total)
    const rows = [
      ['Reservation No.', data.resNo],
      ['Guest Name',      data.guestName],
      ['Room',            data.roomId + ' · ' + data.roomType],
      ['Check-in',        data.checkIn],
      ['Check-out',       data.checkOut],
      ['Nights',          data.nights],
      ['Rate / Night',    fmt(data.ratePerNight)],
      ['Subtotal',        fmt(data.subtotal)],
      ['VAT (12%)',       fmt(data.tax)],
    ];
    document.getElementById('bill-rows').innerHTML =
      rows.map(([k,v]) => `<div class="bill-row"><span>${k}</span><span>${v}</span></div>`).join('') +
      `<div class="bill-row total"><span>Total Amount Due</span><span>${fmt(data.total)}</span></div>` +
      `<div class="bill-row"><span>Status</span><span>${data.status.replace(/_/g,' ').toUpperCase()}</span></div>`;
    document.getElementById('bill-card').classList.add('show');

  } catch(e) {
    showAlert('ebill-alert','error','Cannot connect to server.');
  }
}

/* Enter key support */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('tab-login').classList.contains('active')) doLogin();
  else lookupEBill();
});

/* Redirect if already logged in */
if (sessionStorage.getItem('user')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
